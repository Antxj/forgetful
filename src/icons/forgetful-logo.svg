<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#g)"/>
  <!-- clock ring with a gap on the top-right (circumference ~817: dash 612 + gap 205) -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#ffffff" stroke-width="36"
          stroke-linecap="round" stroke-dasharray="612 205"/>
  <!-- ring dissolving into fading dots -->
  <circle cx="381.6" cy="222.4" r="17" fill="#ffffff" opacity="0.75"/>
  <circle cx="347.9" cy="164.1" r="13" fill="#ffffff" opacity="0.5"/>
  <circle cx="289.6" cy="130.4" r="9"  fill="#ffffff" opacity="0.28"/>
  <!-- clock hands -->
  <line x1="256" y1="256" x2="256" y2="178" stroke="#ffffff" stroke-width="32" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="308" y2="288" stroke="#ffffff" stroke-width="32" stroke-linecap="round"/>
</svg>
